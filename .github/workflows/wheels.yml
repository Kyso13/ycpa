name: Build wheels

# Runs when a tag (e.g. v0.1.0) is pushed or triggered manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.21
        # All configuration lives in pyproject.toml [tool.cibuildwheel].
        # Eigen is downloaded per platform via scripts/install_eigen.sh.

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Publish to PyPI on tagged releases (requires PYPI_API_TOKEN secret).
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write   # for PyPI trusted publishing (token-free)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed with Trusted Publishing; otherwise:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
